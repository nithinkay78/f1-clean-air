<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>F1 Clean Air — Live</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0d10;
    color: #e8e8e8;
    padding: 24px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.5px; }
  .meta { color: #9aa0a6; font-size: 13px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #222; }
  th { color: #9aa0a6; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  tr:hover td { background: #15181c; }
  .team-bar { display: inline-block; width: 4px; height: 18px; vertical-align: middle; margin-right: 8px; border-radius: 2px; }
  .pos { font-weight: 700; width: 30px; }
  .tla { font-weight: 700; }
  .pit { color: #ffb84d; font-weight: 600; }
  .out { color: #777; }
  .compound-SOFT { color: #ff4d4d; font-weight: 700; }
  .compound-MEDIUM { color: #ffd23f; font-weight: 700; }
  .compound-HARD { color: #f5f5f5; font-weight: 700; }
  .compound-INTERMEDIATE { color: #3ddc84; font-weight: 700; }
  .compound-WET { color: #4da6ff; font-weight: 700; }
  .status { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .updated { color: #555; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
  <h1>F1 CLEAN AIR — LIVE TIMING</h1>
  <div class="meta" id="session-meta">Connecting…</div>
  <table>
    <thead>
      <tr>
        <th>Pos</th>
        <th>Driver</th>
        <th>Team</th>
        <th>Gap</th>
        <th>Interval</th>
        <th>Last Lap</th>
        <th>Best Lap</th>
        <th>Tyre</th>
        <th>Laps</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="updated" id="updated"></div>

<script>
async function refresh() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('session-meta').textContent = 'Connection error — retrying…';
  }
}

function render(data) {
  const meta = document.getElementById('session-meta');
  const session = data.session || {};
  const track = data.track_status || {};
  const parts = [];
  if (session.Meeting?.Name) parts.push(session.Meeting.Name);
  if (session.Name) parts.push(session.Name);
  if (track.Status) parts.push('Track: ' + track.Status);
  meta.textContent = parts.length ? parts.join(' · ') : 'Waiting for session data…';

  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  for (const d of data.drivers) {
    const tr = document.createElement('tr');
    const compoundClass = d.compound ? 'compound-' + d.compound : '';
    const statusBadge = d.retired ? '<span class="out">OUT</span>'
      : d.in_pit ? '<span class="pit">PIT</span>' : '';
    tr.innerHTML = `
      <td class="pos">${d.position ?? '-'}</td>
      <td>
        <span class="team-bar" style="background:#${d.team_colour || '444'}"></span>
        <span class="tla">${d.tla || d.racing_number}</span> ${statusBadge}
      </td>
      <td>${d.team || ''}</td>
      <td>${d.gap_to_leader || ''}</td>
      <td>${d.interval || ''}</td>
      <td>${d.last_lap || ''}</td>
      <td>${d.best_lap || ''}</td>
      <td class="${compoundClass}">${d.compound || ''}${d.tyre_age != null ? ' (' + d.tyre_age + ')' : ''}</td>
      <td>${d.laps ?? ''}</td>
    `;
    rows.appendChild(tr);
  }

  document.getElementById('updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
