<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>F1 Clean Air — Live</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav>
    <div class="brand">F1 <span>Clean</span> Air</div>
    <div class="links">
      <a href="/">Home</a>
      <a href="/live" class="active">Live</a>
      <a href="/circuits">Circuits</a>
      <a href="/drivers">Drivers</a>
    </div>
  </nav>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>

  <div class="live-wrap">
    <div class="live-header">
      <h1>Live Timing</h1>
      <div class="meta" id="session-meta">Connecting…</div>
      <div class="settings">
        <button id="settings-btn" class="settings-btn" aria-label="Settings">⚙</button>
        <div class="settings-panel" id="settings-panel">
          <label>
            <input type="checkbox" id="show-diffs" checked />
            Show lap-to-lap changes
          </label>
        </div>
      </div>
    </div>
    <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="mono">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th class="mono">Gap</th>
          <th class="mono">Interval</th>
          <th>Trend</th>
          <th class="mono">Last Lap</th>
          <th class="mono">Best Lap</th>
          <th>Tyre</th>
          <th class="mono">Laps</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    </div>
    <div class="updated" id="updated"></div>
  </div>

<script>
const settings = JSON.parse(localStorage.getItem('f1cleanair_settings') || '{}');
if (settings.showDiffs === undefined) settings.showDiffs = true;

const showDiffsCheckbox = document.getElementById('show-diffs');
showDiffsCheckbox.checked = settings.showDiffs;
showDiffsCheckbox.addEventListener('change', () => {
  settings.showDiffs = showDiffsCheckbox.checked;
  localStorage.setItem('f1cleanair_settings', JSON.stringify(settings));
  if (lastData) render(lastData);
});

document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.toggle('open');
});

const driverState = {};
let lastData = null;

function parseTimeToSeconds(t) {
  if (!t) return null;
  const parts = t.split(':');
  let v;
  if (parts.length === 2) v = parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
  else v = parseFloat(t);
  return isNaN(v) ? null : v;
}

function parseGapToSeconds(g) {
  if (!g) return null;
  const v = parseFloat(g.replace('+', ''));
  return isNaN(v) ? null : v;
}

function diffOf(prev, cur) {
  return (prev !== null && cur !== null) ? cur - prev : null;
}

function diffBadge(delta) {
  if (delta === null || delta === undefined) return '';
  if (Math.abs(delta) < 0.001) return '<span class="diff diff-flat">±0.000</span>';
  const cls = delta < 0 ? 'diff-good' : 'diff-bad';
  const sign = delta < 0 ? '−' : '+';
  return `<span class="diff ${cls}">${sign}${Math.abs(delta).toFixed(3)}</span>`;
}

async function refresh() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    lastData = data;
    render(data);
  } catch (e) {
    document.getElementById('session-meta').textContent = 'Connection error — retrying…';
  }
}

function render(data) {
  const meta = document.getElementById('session-meta');
  const session = data.session || {};
  const track = data.track_status || {};
  const parts = [];
  if (session.Meeting?.Name) parts.push(session.Meeting.Name);
  if (session.Name) parts.push(session.Name);
  if (track.Status) parts.push('Track: ' + track.Status);
  meta.textContent = parts.length ? parts.join(' · ') : 'Waiting for session data…';

  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  for (const d of data.drivers) {
    const num = d.racing_number;
    const prev = driverState[num];
    let diffs = (prev && prev.diffs) || {};

    if (prev && prev.laps !== undefined && prev.laps !== d.laps) {
      diffs = {
        last_lap: diffOf(parseTimeToSeconds(prev.last_lap), parseTimeToSeconds(d.last_lap)),
        gap: diffOf(parseGapToSeconds(prev.gap_to_leader), parseGapToSeconds(d.gap_to_leader)),
        interval: diffOf(parseGapToSeconds(prev.interval), parseGapToSeconds(d.interval)),
      };
    }
    driverState[num] = {
      laps: d.laps,
      last_lap: d.last_lap,
      gap_to_leader: d.gap_to_leader,
      interval: d.interval,
      diffs,
    };

    const tr = document.createElement('tr');
    const prefs = window.F1Prefs || { favoriteTeams: [], favoriteDrivers: [] };
    const isFavorite = prefs.favoriteDrivers.includes(d.tla) || prefs.favoriteTeams.includes(d.team);
    if (isFavorite) tr.className = 'favorite-row';
    const tyreClass = d.compound ? 'tyre-' + d.compound : '';
    const statusBadge = d.retired ? '<span class="out">OUT</span>'
      : d.in_pit ? '<span class="pit">PIT</span>' : '';
    tr.innerHTML = `
      <td class="pos">${d.position ?? '-'} ${moveBadge(d.position_change)}</td>
      <td>
        <span class="team-bar" style="background:#${d.team_colour || '444'}"></span>
        <span class="tla">${d.tla || d.racing_number}</span> ${statusBadge}
      </td>
      <td>${d.team || ''}</td>
      <td class="mono">${d.gap_to_leader || ''} ${settings.showDiffs ? diffBadge(diffs.gap) : ''}</td>
      <td class="mono">${d.interval || ''} ${settings.showDiffs ? diffBadge(diffs.interval) : ''}</td>
      <td>${trendBadge(d.gap_trend)}</td>
      <td class="mono">${d.last_lap || ''} ${settings.showDiffs ? diffBadge(diffs.last_lap) : ''}</td>
      <td class="mono">${d.best_lap || ''}</td>
      <td>${d.compound ? `<span class="tyre-badge ${tyreClass}">${d.compound[0]} ${d.tyre_age ?? ''}</span>${degradationBadge(d.tyre_degradation)}` : ''}</td>
      <td class="mono">${d.laps ?? ''}</td>
    `;
    rows.appendChild(tr);
  }

  renderTicker(data.drivers);

  document.getElementById('updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

function trendBadge(trend) {
  if (trend === 'closing') return '<span class="trend trend-closing">▼ Closing</span>';
  if (trend === 'opening') return '<span class="trend trend-opening">▲ Opening</span>';
  if (trend === 'stable') return '<span class="trend trend-stable">– Stable</span>';
  return '';
}

function degradationBadge(level) {
  if (level === 'high') return '<span class="degradation" title="Lap times trending above stint average">⚠</span>';
  return '';
}

function moveBadge(change) {
  if (!change) return '';
  if (change > 0) return `<span class="move move-up">▲${change}</span>`;
  return `<span class="move move-down">▼${Math.abs(change)}</span>`;
}

function renderTicker(drivers) {
  const ticker = document.getElementById('ticker');
  const items = drivers.map(d => {
    const cls = d.position_change > 0 ? 'move-up' : d.position_change < 0 ? 'move-down' : 'move-flat';
    const arrow = d.position_change > 0 ? '▲' : d.position_change < 0 ? '▼' : '–';
    const change = d.position_change ? Math.abs(d.position_change) : '';
    return `<span class="ticker-item">
      <span class="tla">${d.tla || d.racing_number}</span>
      <span class="mono">${d.gap_to_leader || '-'}</span>
      <span class="mono ${cls}">${arrow}${change}</span>
    </span>`;
  }).join('');
  ticker.innerHTML = items + items;
}

document.addEventListener('f1prefs-change', () => { if (lastData) render(lastData); });

refresh();
setInterval(refresh, 2000);
</script>
<script src="/theme.js"></script>
</body>
</html>
